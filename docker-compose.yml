services:
  postgres:
    image: postgres:15-alpine
    container_name: foodrush_db
    environment:
      POSTGRES_USER: foodrush
      POSTGRES_PASSWORD: foodrush123
      POSTGRES_DB: foodrush_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foodrush -d foodrush_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: foodrush_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://foodrush:foodrush123@postgres:5432/foodrush_db
      SECRET_KEY: supersecretjwtkey2026waffor
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      ENVIRONMENT: production
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: foodrush_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
